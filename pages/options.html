<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT Export - &#x8BBE;&#x7F6E;</title>
  <style>
    :root {
      --bg: #fafaf9;
      --bg-card: #ffffff;
      --border: #e7e5e4;
      --text: #1c1917;
      --text-secondary: #78716c;
      --text-tertiary: #a8a29e;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(28,25,23,0.06), 0 1px 2px rgba(28,25,23,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 520px;
      margin: 0 auto;
      padding: 48px 24px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .page-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(79,70,229,0.25);
      flex-shrink: 0;
    }

    .page-icon svg {
      width: 18px;
      height: 18px;
      color: #fff;
    }

    .page-header-text h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.3;
    }

    .page-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    .setting-item {
      margin-bottom: 16px;
    }

    .setting-item:last-child {
      margin-bottom: 0;
    }

    .field-label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    input[type="text"], select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      font-family: inherit;
      line-height: 1.5;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }

    input[type="text"]::placeholder {
      color: var(--text-tertiary);
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      cursor: pointer;
    }

    .check-item + .check-item {
      border-top: 1px solid var(--border);
    }

    .check-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .check-label {
      font-size: 13px;
      color: var(--text);
      flex: 1;
      user-select: none;
      cursor: pointer;
    }

    .check-hint {
      font-size: 11px;
      color: var(--text-tertiary);
      display: block;
      margin-top: 1px;
    }

    .save-area {
      margin-top: 8px;
    }

    #saveSettings {
      background: var(--accent);
      color: #ffffff;
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    #saveSettings:hover {
      background: var(--accent-hover);
      box-shadow: 0 2px 8px rgba(79,70,229,0.25);
    }

    #saveSettings:active {
      transform: scale(0.98);
    }

    .status {
      margin-top: 12px;
      padding: 8px 14px;
      border-radius: 8px;
      display: none;
      font-size: 13px;
      font-weight: 500;
    }

    .success {
      display: block;
      color: #15803d;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }

    .error {
      display: block;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <div class="page-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </div>
    <div class="page-header-text">
      <h1>GPT Export</h1>
      <p class="page-desc">&#x914D;&#x7F6E;&#x5BFC;&#x51FA;&#x504F;&#x597D;&#x548C;&#x652F;&#x6301;&#x7684;&#x7F51;&#x7AD9;</p>
    </div>
  </div>

  <div class="card">
    <div class="card-title">&#x5BFC;&#x51FA;&#x8BBE;&#x7F6E;</div>

    <div class="setting-item">
      <label class="field-label" for="defaultFormat">&#x9ED8;&#x8BA4;&#x683C;&#x5F0F;</label>
      <select id="defaultFormat">
        <option value="json">JSON</option>
        <option value="md">Markdown (.md)</option>
        <option value="pdf">PDF</option>
      </select>
    </div>

    <div class="setting-item">
      <label class="field-label" for="fileNamePrefix">&#x6587;&#x4EF6;&#x540D;&#x524D;&#x7F00;</label>
      <input type="text" id="fileNamePrefix" placeholder="gpt_conversation">
    </div>

  </div>

  <div class="card">
    <div class="card-title">&#x652F;&#x6301;&#x7684;&#x7F51;&#x7AD9;</div>

    <label class="check-item">
      <input type="checkbox" id="enableChatGPT" checked>
      <span class="check-label">
        ChatGPT
        <span class="check-hint">chatgpt.com / chat.openai.com</span>
      </span>
    </label>

    <label class="check-item">
      <input type="checkbox" id="enableGemini" checked>
      <span class="check-label">
        Gemini
        <span class="check-hint">gemini.google.com</span>
      </span>
    </label>

    <label class="check-item">
      <input type="checkbox" id="enableBing" checked>
      <span class="check-label">
        Bing Chat
        <span class="check-hint">www.bing.com</span>
      </span>
    </label>

    <label class="check-item">
      <input type="checkbox" id="enableCopilot" checked>
      <span class="check-label">
        Microsoft Copilot
        <span class="check-hint">copilot.microsoft.com</span>
      </span>
    </label>
  </div>

  <div class="save-area">
    <button id="saveSettings">&#x4FDD;&#x5B58;&#x8BBE;&#x7F6E;</button>
    <div id="statusMessage" class="status"></div>
  </div>

  <script src="../src/options.js"></script>
</body>
</html>
