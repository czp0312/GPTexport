<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT Export - 设置</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      padding: 48px 24px;
      max-width: 560px;
      margin: 0 auto;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(59, 130, 246, 0.25);
      flex-shrink: 0;
    }

    .logo svg {
      width: 24px;
      height: 24px;
      color: white;
    }

    .page-title h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .page-title p {
      font-size: 14px;
      color: var(--text-muted);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::before {
      content: '';
      display: block;
      width: 4px;
      height: 16px;
      background: var(--primary);
      border-radius: 2px;
    }

    .setting-group {
      margin-bottom: 20px;
    }

    .setting-group:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    input[type="text"], select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text-main);
      background: var(--surface);
      transition: all 0.2s;
      outline: none;
      font-family: inherit;
    }

    input[type="text"]:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    input[type="text"]::placeholder {
      color: var(--text-light);
    }

    .checkbox-list {
      display: flex;
      flex-direction: column;
    }

    .checkbox-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .checkbox-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .checkbox-item:first-of-type {
      padding-top: 0;
    }

    input[type="checkbox"] {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid #cbd5e1;
      border-radius: 5px;
      outline: none;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
      margin-top: 2px;
      flex-shrink: 0;
    }

    input[type="checkbox"]:checked {
      background-color: var(--primary);
      border-color: var(--primary);
    }

    input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 6px;
      top: 2px;
      width: 4px;
      height: 10px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .checkbox-text {
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    .checkbox-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
    }

    .checkbox-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-save {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
      font-family: inherit;
    }

    .btn-save:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    .status {
      display: none;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .status.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .status.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </div>
    <div class="page-title">
      <h1>GPT Export</h1>
      <p>配置导出偏好和支持的网站</p>
    </div>
  </div>

  <div class="card">
    <div class="card-title">导出设置</div>

    <div class="setting-group">
      <label class="setting-label" for="defaultFormat">默认导出格式</label>
      <select id="defaultFormat">
        <option value="json">JSON</option>
        <option value="md">Markdown (.md)</option>
        <option value="pdf">PDF</option>
      </select>
    </div>

    <div class="setting-group">
      <label class="setting-label" for="fileNamePrefix">文件名前缀</label>
      <input type="text" id="fileNamePrefix" placeholder="gpt_conversation">
    </div>
  </div>

  <div class="card">
    <div class="card-title">支持的网站</div>
    
    <div class="checkbox-list">
      <label class="checkbox-item">
        <input type="checkbox" id="enableChatGPT" checked>
        <div class="checkbox-text">
          <span class="checkbox-title">ChatGPT</span>
          <span class="checkbox-desc">chatgpt.com / chat.openai.com</span>
        </div>
      </label>

      <label class="checkbox-item">
        <input type="checkbox" id="enableGemini" checked>
        <div class="checkbox-text">
          <span class="checkbox-title">Gemini</span>
          <span class="checkbox-desc">gemini.google.com</span>
        </div>
      </label>

      <label class="checkbox-item">
        <input type="checkbox" id="enableBing" checked>
        <div class="checkbox-text">
          <span class="checkbox-title">Bing Chat</span>
          <span class="checkbox-desc">www.bing.com / bing.com</span>
        </div>
      </label>

      <label class="checkbox-item">
        <input type="checkbox" id="enableCopilot" checked>
        <div class="checkbox-text">
          <span class="checkbox-title">Microsoft Copilot</span>
          <span class="checkbox-desc">copilot.microsoft.com</span>
        </div>
      </label>

      <label class="checkbox-item">
        <input type="checkbox" id="enableClaude" checked>
        <div class="checkbox-text">
          <span class="checkbox-title">Claude</span>
          <span class="checkbox-desc">claude.ai</span>
        </div>
      </label>
    </div>
  </div>

  <div class="actions">
    <button id="saveSettings" class="btn-save">保存设置</button>
    <div id="statusMessage" class="status"></div>
  </div>

  <script src="../src/options.js"></script>
</body>
</html>
