<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT &#x5BF9;&#x8BDD;&#x5BFC;&#x51FA;</title>
  <style>
    :root {
      --bg0: #f7f8ff;
      --bg1: #f6fbff;
      --card: rgba(255, 255, 255, 0.92);
      --border: rgba(17, 24, 39, 0.10);
      --text: #111827;
      --muted: #6b7280;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.10);
      --shadow-sm: 0 6px 16px rgba(17, 24, 39, 0.10);
      --radius: 14px;

      --primary: #2563eb;
      --primary-hover: #1d4ed8;
    }

    html {
      width: 350px;
      height: 560px;
      overflow: hidden;
    }

    body {
      width: 350px;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      background: radial-gradient(120% 90% at 10% 0%, var(--bg1), transparent 55%),
                  radial-gradient(120% 90% at 100% 20%, var(--bg0), transparent 55%),
                  linear-gradient(180deg, #ffffff, #f7fafc);
      height: 560px;
      overflow: hidden;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      color: var(--text);
    }

    h1 {
      font-size: 16px;
      margin: 0;
      letter-spacing: 0.2px;
    }

    .header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 12px 12px 10px;
      margin-bottom: 10px;
    }

    .header-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.3;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .selection-controls {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    button {
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: transform 0.05s ease, background-color 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      user-select: none;
    }

    button:active {
      transform: translateY(1px);
    }

    button:focus-visible {
      outline: 2px solid rgba(37, 99, 235, 0.45);
      outline-offset: 2px;
    }

    .select-btn {
      background: rgba(37, 99, 235, 0.08);
      color: var(--primary);
      border-color: rgba(37, 99, 235, 0.20);
      flex: 1;
    }

    .select-btn:hover {
      background: rgba(37, 99, 235, 0.12);
      border-color: rgba(37, 99, 235, 0.26);
    }

    .export-section {
      margin-top: 2px;
    }

    .format-selection {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .format-btn {
      background: var(--primary);
      color: #fff;
      flex: 1;
      box-shadow: var(--shadow-sm);
    }

    .format-btn:hover {
      background: var(--primary-hover);
    }

    .format-btn.json {
      background: #0f172a;
    }

    .format-btn.json:hover {
      background: #111827;
    }

    .format-btn.md {
      background: #7c3aed;
    }

    .format-btn.md:hover {
      background: #6d28d9;
    }

    .format-btn.pdf {
      background: #ea580c;
    }

    .format-btn.pdf:hover {
      background: #c2410c;
    }

    .status {
      padding: 10px 12px;
      border-radius: 12px;
      text-align: center;
      display: none;
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: var(--shadow-sm);
      font-size: 13px;
    }

    .success {
      border-color: rgba(34, 197, 94, 0.25);
      color: #166534;
      display: block;
    }

    .error {
      border-color: rgba(239, 68, 68, 0.25);
      color: #7f1d1d;
      display: block;
    }

    .dialogue-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      background: var(--card);
      box-shadow: var(--shadow-sm);
    }

    .dialogue-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 10px;
      border-radius: 12px;
    }

    .dialogue-item:hover {
      background: rgba(17, 24, 39, 0.04);
    }

    .dialogue-checkbox {
      margin-top: 4px;
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }

    .dialogue-content {
      flex: 1;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
      line-height: 1.4;
      font-size: 13px;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
    }

    .dialogue-meta {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.04);
      color: var(--muted);
      width: fit-content;
    }

    .role-user {
      background: rgba(37, 99, 235, 0.10);
      border-color: rgba(37, 99, 235, 0.22);
      color: var(--primary);
    }

    .role-assistant {
      background: rgba(124, 58, 237, 0.10);
      border-color: rgba(124, 58, 237, 0.22);
      color: #6d28d9;
    }

    .preview-text {
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    #noDialogues {
      margin: 0;
      padding: 10px 12px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .dialogue-list::-webkit-scrollbar { width: 10px; }
    .dialogue-list::-webkit-scrollbar-thumb { background: rgba(17, 24, 39, 0.12); border-radius: 999px; border: 3px solid rgba(255,255,255,0); background-clip: padding-box; }
    .dialogue-list::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <h1>GPT &#x5BF9;&#x8BDD;&#x5BFC;&#x51FA;</h1>
    </div>
    <div class="subtitle">&#x52FE;&#x9009;&#x8981;&#x5BFC;&#x51FA;&#x7684;&#x5BF9;&#x8BDD;&#xFF0C;&#x7136;&#x540E;&#x9009;&#x62E9;&#x5BFC;&#x51FA;&#x683C;&#x5F0F;&#x3002;</div>
  </div>

  <div class="controls">
    <div class="selection-controls">
      <button id="selectAllBtn" class="select-btn">&#x5168;&#x9009;</button>
      <button id="unselectAllBtn" class="select-btn">&#x53D6;&#x6D88;&#x5168;&#x9009;</button>
    </div>

    <div class="dialogue-list" id="dialogueList">
      <p id="noDialogues">&#x6682;&#x65E0;&#x5BF9;&#x8BDD;&#x5185;&#x5BB9;</p>
    </div>

    <div class="export-section">
      <div class="format-selection">
        <button id="exportJsonBtn" class="format-btn json">&#x5BFC;&#x51FA; JSON</button>
        <button id="exportMdBtn" class="format-btn md">&#x5BFC;&#x51FA; MD</button>
        <button id="exportPdfBtn" class="format-btn pdf">&#x5BFC;&#x51FA; PDF</button>
      </div>
    </div>

    <div id="statusMessage" class="status"></div>
  </div>

  <script src="../src/popup.js"></script>
</body>
</html>
