<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT Export</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --user-bg: #eff6ff;
      --user-text: #1d4ed8;
      --ai-bg: #f0fdf4;
      --ai-text: #15803d;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 380px;
      height: 580px;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .app-header {
      background: var(--surface);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
    }

    .logo svg {
      width: 18px;
      height: 18px;
      color: white;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-main);
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 16px;
      gap: 12px;
    }

    /* List Controls */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .list-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .list-actions {
      display: flex;
      gap: 8px;
    }

    .btn-text {
      background: none;
      border: none;
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      transition: background 0.2s;
    }

    .btn-text:hover {
      background: var(--user-bg);
    }

    /* Status Message */
    .status {
      display: none;
      position: absolute;
      top: 80px;
      left: 20px;
      right: 20px;
      z-index: 50;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      animation: slideDown 0.3s ease;
      box-shadow: var(--shadow-md);
    }

    @keyframes slideDown {
      from { transform: translateY(-10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .status.success {
      display: block;
      background: rgba(220, 252, 231, 0.95);
      backdrop-filter: blur(8px);
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .status.error {
      display: block;
      background: rgba(254, 226, 226, 0.95);
      backdrop-filter: blur(8px);
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    /* Dialogue List */
    .dialogue-list {
      flex: 1;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
    }

    .dialogue-list::-webkit-scrollbar { width: 6px; }
    .dialogue-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dialogue-list::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    #noDialogues {
      margin: auto;
      text-align: center;
      color: var(--text-light);
      font-size: 14px;
      padding: 20px;
    }

    .dialogue-item {
      display: flex;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
      align-items: flex-start;
    }

    .dialogue-item:last-child {
      border-bottom: none;
    }

    .dialogue-item:hover {
      background: var(--bg);
    }

    .dialogue-checkbox {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid #cbd5e1;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
      margin-right: 12px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .dialogue-checkbox:checked {
      background-color: var(--primary);
      border-color: var(--primary);
    }

    .dialogue-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 1px;
      width: 4px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .dialogue-content {
      flex: 1;
      min-width: 0;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .dialogue-meta {
      display: flex;
      align-items: center;
    }

    .role-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .role-user { background: var(--user-bg); color: var(--user-text); }
    .role-assistant { background: var(--ai-bg); color: var(--ai-text); }

    .preview-text {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Footer / Export Controls */
    .app-footer {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.05);
      z-index: 10;
    }

    .export-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .export-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 0;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-main);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .export-btn svg {
      width: 16px;
      height: 16px;
      transition: transform 0.2s;
    }

    .export-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .export-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .export-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: var(--bg);
      transform: none;
      box-shadow: none;
    }

    /* Specific Button Styles */
    .export-btn.btn-json { border-color: #fde047; }
    .export-btn.btn-json:hover:not(:disabled) { border-color: #eab308; background: #fefce8; color: #a16207; }
    .export-btn.btn-json svg { color: #eab308; }

    .export-btn.btn-md { border-color: #86efac; }
    .export-btn.btn-md:hover:not(:disabled) { border-color: #22c55e; background: #f0fdf4; color: #15803d; }
    .export-btn.btn-md svg { color: #22c55e; }

    .export-btn.btn-pdf { border-color: #fca5a5; }
    .export-btn.btn-pdf:hover:not(:disabled) { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
    .export-btn.btn-pdf svg { color: #ef4444; }

    .export-btn.is-default::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--primary);
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </div>
      <span class="brand-title">GPT Export</span>
    </div>
  </header>

  <main class="main-content">
    <div id="statusMessage" class="status"></div>
    
    <div class="list-header">
      <span class="list-title">对话内容</span>
      <div class="list-actions">
        <button id="selectAllBtn" class="btn-text">全选</button>
        <button id="unselectAllBtn" class="btn-text">清除</button>
      </div>
    </div>

    <div class="dialogue-list" id="dialogueList">
      <p id="noDialogues">暂无对话内容</p>
    </div>
  </main>

  <footer class="app-footer">
    <div class="export-grid">
      <button id="exportJsonBtn" class="export-btn btn-json">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        JSON
      </button>
      <button id="exportMdBtn" class="export-btn btn-md">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Markdown
      </button>
      <button id="exportPdfBtn" class="export-btn btn-pdf">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        PDF
      </button>
    </div>
  </footer>

  <script src="../src/popup.js"></script>
</body>
</html>
