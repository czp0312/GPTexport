<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF &#x9884;&#x89C8; - GPT Export</title>
  <style>
    :root {
      --bg: #fafaf9;
      --bg-card: #ffffff;
      --border: #e7e5e4;
      --text: #1c1917;
      --text-secondary: #78716c;
      --text-tertiary: #a8a29e;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(28,25,23,0.06), 0 1px 2px rgba(28,25,23,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(250,250,249,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .bar {
      max-width: 800px;
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 3px rgba(79,70,229,0.3);
    }

    .title-icon svg {
      width: 14px;
      height: 14px;
      color: #fff;
    }

    .title-text {
      display: flex;
      flex-direction: column;
    }

    .title-text strong {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    #subtitle {
      color: var(--text-secondary);
      font-size: 12px;
    }

    .actions { display: flex; gap: 6px; align-items: center; }

    #openPdfBtn { display: none; }

    button {
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    button:hover {
      border-color: #d6d3d1;
      color: var(--text);
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:active:not(:disabled) { transform: scale(0.98); }

    #printToPdfBtn {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
      font-weight: 600;
    }

    #printToPdfBtn:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      box-shadow: 0 2px 8px rgba(79,70,229,0.25);
    }

    .ghost {
      background: transparent;
      border-color: transparent;
    }

    .ghost:hover {
      background: rgba(28,25,23,0.04);
      border-color: var(--border);
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
    }

    .status {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      font-size: 13px;
      box-shadow: var(--shadow);
    }

    #pdf-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
    }

    @media print {
      header { display: none !important; }
      .status { display: none !important; }
      main { max-width: none; padding: 0; }
      #pdf-content { border: none; border-radius: 0; padding: 0; box-shadow: none; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: #fff; }
    }

    /* ── Content Formatting ── */
    #pdf-content h1 { font-size: 1.4em; font-weight: 700; margin: 16px 0 8px; }
    #pdf-content h2 { font-size: 1.2em; font-weight: 600; margin: 14px 0 6px; }
    #pdf-content h3 { font-size: 1.1em; font-weight: 600; margin: 12px 0 5px; }
    #pdf-content h4 { font-size: 1.0em; font-weight: 600; margin: 10px 0 4px; }
    #pdf-content h5 { font-size: 0.95em; font-weight: 600; margin: 8px 0 3px; }
    #pdf-content h6 { font-size: 0.9em; font-weight: 600; margin: 8px 0 3px; color: var(--text-secondary); }
    #pdf-content p { margin: 6px 0; }
    #pdf-content ul, #pdf-content ol { padding-left: 20px; margin: 4px 0; }
    #pdf-content li { margin: 2px 0; }
    #pdf-content pre { background: #f5f5f4; padding: 12px; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); }
    #pdf-content code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    #pdf-content :not(pre) > code { background: #f5f5f4; padding: 1px 5px; border-radius: 4px; font-size: 0.9em; }
    #pdf-content blockquote { margin: 6px 0; padding-left: 12px; border-left: 3px solid #d6d3d1; color: var(--text-secondary); }
    #pdf-content hr { margin: 12px 0; border: 0; border-top: 1px solid var(--border); }
    #pdf-content a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    #pdf-content a:hover { color: var(--accent-hover); }
    #pdf-content img { max-width: 100%; height: auto; border-radius: 6px; }
    #pdf-content table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    #pdf-content th, #pdf-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; font-size: 0.9em; }
    #pdf-content th { background: #f5f5f4; font-weight: 600; }
    .plain { white-space: pre-wrap; word-break: break-word; }

    #pdf-content pre,
    #pdf-content blockquote,
    #pdf-content table,
    #pdf-content img {
      break-inside: avoid;
      page-break-inside: avoid;
    }
    #pdf-content h1,
    #pdf-content h2,
    #pdf-content h3,
    #pdf-content h4 {
      break-after: avoid;
      page-break-after: avoid;
    }

    /* ── KaTeX ── */
    .katex, .katex-display { white-space: nowrap; }
    .katex { display: inline-block; font: normal 1.1em serif; line-height: 1.2; text-indent: 0; }
    .katex .katex-html { display: inline-block; }
    .katex .base { display: inline-block; }
    .katex .strut { display: inline-block; }
    .katex .mord, .katex .mbin, .katex .mrel, .katex .mopen, .katex .mclose, .katex .mpunct, .katex .minner { display: inline-block; }
    .katex-display { display: block; margin: 10px 0; text-align: center; }
    .katex-display > .katex { display: inline-block; }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="title">
        <div class="title-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </div>
        <div class="title-text">
          <strong>PDF &#x9884;&#x89C8;</strong>
          <span id="subtitle">&#x52A0;&#x8F7D;&#x4E2D;...</span>
        </div>
      </div>
      <div class="actions">
        <button id="printToPdfBtn">&#x9AD8;&#x8D28;&#x91CF;&#x4E0B;&#x8F7D;</button>
        <button id="openPdfBtn" class="ghost">&#x5FEB;&#x901F;&#x4E0B;&#x8F7D;</button>
        <button id="closeBtn" class="ghost">&#x5173;&#x95ED;</button>
      </div>
    </div>
  </header>

  <main>
    <div class="status" id="status">&#x6B63;&#x5728;&#x8BFB;&#x53D6;&#x5BF9;&#x8BDD;&#x5185;&#x5BB9;...</div>
    <div id="pdf-content"></div>
  </main>

  <script src="../src/pdf_preview.js"></script>
</body>
</html>
