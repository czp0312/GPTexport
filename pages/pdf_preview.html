<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF 预览 - GPT Export</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --radius-md: 12px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    .header-content {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
    }

    .logo svg { width: 16px; height: 16px; color: white; }

    .title-text { display: flex; flex-direction: column; line-height: 1.3; }
    .title-text strong { font-size: 15px; font-weight: 600; }
    .title-text span { font-size: 12px; color: var(--text-muted); }

    .header-actions { display: flex; gap: 8px; }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
      box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
      transform: translateY(-1px);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background: var(--bg);
      border-color: #cbd5e1;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }

    main {
      max-width: 800px;
      margin: 24px auto 48px;
      padding: 0 24px;
    }

    #status {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      box-shadow: var(--shadow-sm);
    }

    #pdf-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 40px;
      box-shadow: var(--shadow-md);
    }

    @media print {
      header, #status { display: none !important; }
      main { margin: 0; padding: 0; max-width: none; }
      #pdf-content { border: none; box-shadow: none; border-radius: 0; padding: 0; }
      body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }

    /* Markdown Styles */
    #pdf-content h1, #pdf-content h2, #pdf-content h3, #pdf-content h4, #pdf-content h5, #pdf-content h6 {
      color: var(--text-main);
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 600;
      line-height: 1.3;
    }
    #pdf-content h1 { font-size: 1.75em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; margin-top: 0; }
    #pdf-content h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    #pdf-content h3 { font-size: 1.25em; }
    #pdf-content p { margin: 1em 0; }
    #pdf-content a { color: var(--primary); text-decoration: none; }
    #pdf-content a:hover { text-decoration: underline; }
    #pdf-content ul, #pdf-content ol { margin: 1em 0; padding-left: 2em; }
    #pdf-content li { margin: 0.25em 0; }
    #pdf-content blockquote {
      margin: 1em 0; padding: 0.5em 1em;
      color: var(--text-muted);
      border-left: 4px solid #cbd5e1;
      background: #f8fafc;
      border-radius: 0 4px 4px 0;
    }
    #pdf-content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.9em;
      background: #f1f5f9;
      padding: 0.2em 0.4em;
      border-radius: 4px;
      color: #0f172a;
    }
    #pdf-content pre {
      background: #0f172a;
      color: #f8fafc;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1em 0;
    }
    #pdf-content pre code {
      background: none; padding: 0; color: inherit; font-size: 0.85em;
    }
    #pdf-content table {
      width: 100%; border-collapse: collapse; margin: 1em 0;
    }
    #pdf-content th, #pdf-content td {
      border: 1px solid var(--border); padding: 8px 12px; text-align: left;
    }
    #pdf-content th { background: #f8fafc; font-weight: 600; }
    #pdf-content img { max-width: 100%; border-radius: 6px; }

    #pdf-content pre, #pdf-content blockquote, #pdf-content table, #pdf-content img {
      page-break-inside: avoid;
    }
    #pdf-content h1, #pdf-content h2, #pdf-content h3 {
      page-break-after: avoid;
    }
    /* KaTeX */
    .katex, .katex-display { white-space: nowrap; }
    .katex { display: inline-block; font: normal 1.1em serif; line-height: 1.2; text-indent: 0; }
    .katex .katex-html { display: inline-block; }
    .katex .base { display: inline-block; }
    .katex .strut { display: inline-block; }
    .katex .mord, .katex .mbin, .katex .mrel, .katex .mopen, .katex .mclose, .katex .mpunct, .katex .minner { display: inline-block; }
    .katex-display { display: block; margin: 10px 0; text-align: center; }
    .katex-display > .katex { display: inline-block; }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="header-title">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </div>
        <div class="title-text">
          <strong>PDF 预览</strong>
          <span id="subtitle">加载中...</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="downloadPdfBtn" class="btn btn-primary">下载 PDF</button>
        <button id="closeBtn" class="btn btn-secondary">关闭</button>
      </div>
    </div>
  </header>

  <main>
    <div id="status">正在读取对话内容...</div>
    <div id="pdf-content"></div>
  </main>

  <script src="../src/pdf_preview.js"></script>
</body>
</html>
